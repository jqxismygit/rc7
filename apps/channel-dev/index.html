<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <title>微信小程序跳转</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
      }
      body {
        margin: 0;
      }
      .full-bg {
        position: fixed;
        inset: 0;
        background-image: url('https://i.pinimg.com/736x/ff/49/8e/ff498e6922d2092931e1c0a58127bd76.jpg');
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
      }
    </style>
  </head>
  <body>
    <div class="full-bg"></div>
  </body>
</html>
